          contentHtml = `
            ${radioButtons}
            <div class="text-box" id="text-box-${index}">${initialContent}</div>
          `;
        } else {
          // Standard single-reply template
          contentHtml = `
            <div class="text-box" id="text-box-${index}">${reply.thai}</div>
          `;
        }
        
        card.innerHTML = `
          <summary class="reply-title">
            <span class="title-text">${reply.title}</span>
            <button class="copy-btn" id="btn-${index}" onclick="copyRichText(event, ${index}, 'btn-${index}')">Copy</button>
          </summary>
          <div class="reply-content">
            ${contentHtml}
          </div>
        `;
        resultsDiv.appendChild(card);
      }
    });
  }

  function copyRichText(event, index, btnId) {
    event.stopPropagation();
    event.preventDefault();

    // Grab the current HTML directly from the displayed text box
    const textBox = document.getElementById(`text-box-${index}`);
    let htmlContent = textBox.innerHTML;
    
    // Strip out the internal notes completely using regex
    const removeNotesRegex = /<div class="internal-note">.*?<\/div>/gs;
    htmlContent = htmlContent.replace(removeNotesRegex, '').trim();

    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = htmlContent;
    tempDiv.style.position = "absolute";
    tempDiv.style.left = "-9999px";
    
    document.body.appendChild(tempDiv);

    const range = document.createRange();
    range.selectNodeContents(tempDiv);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);

    try {
      document.execCommand('copy');
      
      const btn = document.getElementById(btnId);
      const originalText = btn.innerText;
      btn.innerText = "✓ Copied!";
      btn.classList.add("copied");
      
      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.remove("copied");
      }, 1500);
    } catch (err) {
      alert("Copy failed. Your browser may be blocking scripts in Google Sites.");
    }

    selection.removeAllRanges();
    document.body.removeChild(tempDiv);
  }

  searchBar.addEventListener('input', (e) => {
    renderCards(e.target.value);
  });

  renderCards();
</script>

</html>
